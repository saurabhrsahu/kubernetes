# Replace values before production. For real clusters use Sealed Secrets, External Secrets, or a secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: mongo-auth
  namespace: mongo
  labels:
    app.kubernetes.io/name: mongo
type: Opaque
stringData:
  # Official mongo image: root user + password; optional first DB name.
  # Mapped in deployment.yaml; first init only (empty data dir).
  mongo-root-username: "admin"
  mongo-root-password: "changeme-admin"
  mongo-database: "appdb"
