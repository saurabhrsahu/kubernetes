# Replace values before production. For real clusters use Sealed Secrets, External Secrets, or a secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-auth
  namespace: mariadb
  labels:
    app.kubernetes.io/name: mariadb
type: Opaque
stringData:
  # Official mariadb image (https://github.com/MariaDB/mariadb-docker): creates DB
  # and user on first init when data dir is empty.
  mariadb-root-password: "changeme-root"
  mariadb-database: "appdb"
  mariadb-user: "appuser"
  mariadb-password: "changeme-app"
