# Replace values before production. Used by DOCKER_INFLUXDB_INIT_* on first setup only.
# Image / env: https://hub.docker.com/_/influxdb (InfluxDB v2)
apiVersion: v1
kind: Secret
metadata:
  name: influx-init
  namespace: influx
  labels:
    app.kubernetes.io/name: influx
type: Opaque
stringData:
  influx-username: "admin"
  influx-password: "changeme-admin"
  influx-org: "demo"
  influx-bucket: "metrics"
  # API token created during setup; use for CLI/clients (InfluxDB v2 format).
  influx-admin-token: "changeme-dev-token-replace-in-real-env"
