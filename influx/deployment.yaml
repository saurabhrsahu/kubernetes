# InfluxDB v2: automated setup via DOCKER_INFLUXDB_INIT_* when data/config dirs are empty.
# Pinned tag avoids Docker Hub retagging `latest` to InfluxDB 3. See https://hub.docker.com/_/influxdb
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influx
  namespace: influx
  labels:
    app.kubernetes.io/name: influx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: influx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: influx
    spec:
      initContainers:
        - name: ensure-subpaths
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ec", "mkdir -p /vol/lib /vol/config"]
          volumeMounts:
            - name: data
              mountPath: /vol
      containers:
        - name: influxdb
          image: influxdb:2.8-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: influx-init
                  key: influx-username
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: influx-init
                  key: influx-password
            - name: DOCKER_INFLUXDB_INIT_ORG
              valueFrom:
                secretKeyRef:
                  name: influx-init
                  key: influx-org
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              valueFrom:
                secretKeyRef:
                  name: influx-init
                  key: influx-bucket
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influx-init
                  key: influx-admin-token
          volumeMounts:
            - name: data
              mountPath: /var/lib/influxdb2
              subPath: lib
            - name: data
              mountPath: /etc/influxdb2
              subPath: config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: influx-data
