# Replace values before production. For real clusters use Sealed Secrets, External Secrets, or a secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-auth
  namespace: mysql
  labels:
    app.kubernetes.io/name: mysql
type: Opaque
stringData:
  # Required by the official MySQL image (root). DB name + app user below are
  # mapped to MYSQL_* in deployment.yaml; image creates them on first init.
  mysql-root-password: "changeme-root"
  mysql-database: "appdb"
  mysql-user: "appuser"
  mysql-password: "changeme-app"
