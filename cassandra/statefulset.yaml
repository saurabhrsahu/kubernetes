# Single-node Cassandra: StatefulSet + headless Service for seed DNS (not a Deployment).
# First boot: official cassandra image applies CASSANDRA_* env from ConfigMap; data on PVC.
# Auth: disabled in this sample (AllowAllAuthenticator). See APPLY.txt.
# Image: https://github.com/docker-library/cassandra
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: cassandra
  labels:
    app.kubernetes.io/name: cassandra
spec:
  serviceName: cassandra-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cassandra
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cassandra
    spec:
      containers:
        - name: cassandra
          image: cassandra:5.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: cql
              containerPort: 9042
              protocol: TCP
            - name: intra-node
              containerPort: 7000
              protocol: TCP
            - name: tls-intra-node
              containerPort: 7001
              protocol: TCP
          env:
            - name: CASSANDRA_CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: cassandra-config
                  key: cluster-name
            - name: CASSANDRA_SEEDS
              valueFrom:
                configMapKeyRef:
                  name: cassandra-config
                  key: seeds
            - name: CASSANDRA_DC
              valueFrom:
                configMapKeyRef:
                  name: cassandra-config
                  key: dc
            - name: CASSANDRA_RACK
              valueFrom:
                configMapKeyRef:
                  name: cassandra-config
                  key: rack
            - name: CASSANDRA_ENDPOINT_SNITCH
              valueFrom:
                configMapKeyRef:
                  name: cassandra-config
                  key: snitch
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "128M"
          volumeMounts:
            - name: data
              mountPath: /var/lib/cassandra
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: cql
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 9
          livenessProbe:
            tcpSocket:
              port: cql
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
