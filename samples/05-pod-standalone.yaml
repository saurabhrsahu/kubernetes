# =============================================================================
# 05 - Standalone Pod (rare in production; use Deployment instead)
# =============================================================================
# Label app=web-standalone so the 07 Service (selects app=web) only hits Deployment
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: demo-pod-standalone
  namespace: demo-app
  labels:
    app: web-standalone
    tier: frontend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  serviceAccountName: web-sa
  restartPolicy: Always
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 80
          protocol: TCP
      env:
        - name: ENV_FROM_CONFIG
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: environment
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: api-key
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 5
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
