# =============================================================================
# 03 - ConfigMap and Secret
# =============================================================================
# ConfigMap: non-sensitive configuration as key-value or files.
# Secret: sensitive data; stored base64 in etcd; use RBAC to restrict access.
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: demo-app
  labels:
    app.kubernetes.io/name: web
data:
  # Plain string data (UTF-8)
  app.properties: |
    log.level=INFO
    feature.flags=demo
  # Single key-value
  environment: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: demo-app
  # type: Opaque is generic key-value; also kubernetes.io/tls, dockerconfigjson, etc.
  labels:
    app.kubernetes.io/name: web
type: Opaque
stringData:
  # stringData is converted to base64 for storage; easier than `data:` in files
  api-key: "replace-me-in-real-use"
  db-password: "replace-me"
# Alternative: `data` requires base64-encoded values:
# data:
#   password: c2VjcmV0  # echo -n 'secret' | base64
