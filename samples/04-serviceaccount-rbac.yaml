# =============================================================================
# 04 - ServiceAccount, Role, RoleBinding (namespace-scoped RBAC)
# =============================================================================
# ServiceAccount: identity for pods; tokens mounted at /var/run/secrets/...
# Role: allowed verbs on resources in one namespace
# RoleBinding: links Role to User/Group/ServiceAccount
# =============================================================================
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-sa
  namespace: demo-app
  labels:
    app.kubernetes.io/name: web
# automountServiceAccountToken: false  # set if pod should not get API token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: web-reader
  namespace: demo-app
rules:
  # apiGroups: "" means core (v1) API group
  - apiGroups: [""]
    resources: ["configmaps"]
    # verbs: get, list, watch, create, update, patch, delete
    resourceNames: ["app-config"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secret"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-reader-binding
  namespace: demo-app
subjects:
  # Kind: User | Group | ServiceAccount
  - kind: ServiceAccount
    name: web-sa
    namespace: demo-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: web-reader
