# =============================================================================
# 09 - HorizontalPodAutoscaler (requires metrics-server)
# =============================================================================
# Installs: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/...
# minReplicas/maxReplicas: bounds; Deployment replicas field is managed by HPA
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  namespace: demo-app
  labels:
    app: web
spec:
  # scaleTargetRef: Deployment, StatefulSet, or ReplicaSet
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  # behavior: scale up/down policies (optional)
  # behavior:
  #   scaleDown:
  #     stabilizationWindowSeconds: 300
