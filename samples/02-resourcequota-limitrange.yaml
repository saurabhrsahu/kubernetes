# =============================================================================
# 02 - ResourceQuota + LimitRange (optional but common in real clusters)
# =============================================================================
# ResourceQuota: caps total resource use in a namespace.
# LimitRange: default/min/max for containers that don't set limits.
# =============================================================================
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: demo-app-quota
  namespace: demo-app
  labels:
    app.kubernetes.io/name: demo-app
spec:
  hard:
    # Total CPU and memory the namespace can request across all pods
    requests.cpu: "2"
    requests.memory: 4Gi
    # Total limits (ceiling) allowed in the namespace
    limits.cpu: "4"
    limits.memory: 8Gi
    # Max number of certain object types
    persistentvolumeclaims: "5"
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: demo-app-limits
  namespace: demo-app
spec:
  limits:
    # Default limits/requests for a Container if the Pod spec omits them
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      min:
        cpu: 10m
        memory: 32Mi
      max:
        cpu: "1"
        memory: 1Gi
