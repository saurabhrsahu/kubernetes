# Writes admin credentials via Docker entrypoint → /opt/couchdb/etc/local.d/docker.ini
# Replace values before production.
apiVersion: v1
kind: Secret
metadata:
  name: couch-auth
  namespace: couchdb
  labels:
    app.kubernetes.io/name: couchdb
type: Opaque
stringData:
  couch-user: "admin"
  couch-password: "changeme-admin"
