# Replace values before production. Used on first database init only (empty oradata).
# Image docs: https://hub.docker.com/r/gvenzl/oracle-free
apiVersion: v1
kind: Secret
metadata:
  name: oracle-auth
  namespace: oracledb
  labels:
    app.kubernetes.io/name: oracledb
type: Opaque
stringData:
  # SYS and SYSTEM (same password in this image)
  oracle-password: "changeme-sys"
  # Optional app schema in PDB FREEPDB1 (requires both keys)
  app-user: "appuser"
  app-user-password: "changeme-app"
