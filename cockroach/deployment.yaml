# Single-node CockroachDB for dev/test (--insecure). Not for production.
# Data + optional bootstrap user/DB: COCKROACH_* env (Docker entrypoint) when store is empty.
# Image / flags: https://www.cockroachlabs.com/docs/stable/cockroach-start-single-node
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockroach
  namespace: cockroach
  labels:
    app.kubernetes.io/name: cockroach
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cockroach
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cockroach
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: cockroach
          image: cockroachdb/cockroach:v26.2.0
          imagePullPolicy: IfNotPresent
          args:
            - start-single-node
            - --insecure
            - --listen-addr=0.0.0.0:26257
            - --http-addr=0.0.0.0:8080
          ports:
            - name: grpc
              containerPort: 26257
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: COCKROACH_DATABASE
              valueFrom:
                secretKeyRef:
                  name: cockroach-init
                  key: cockroach-database
            - name: COCKROACH_USER
              valueFrom:
                secretKeyRef:
                  name: cockroach-init
                  key: cockroach-user
            - name: COCKROACH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cockroach-init
                  key: cockroach-password
          volumeMounts:
            - name: data
              mountPath: /cockroach/cockroach-data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cockroach-data
