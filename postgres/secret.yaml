# Replace values before production. For real clusters use Sealed Secrets, External Secrets, or a secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-auth
  namespace: postgres
  labels:
    app.kubernetes.io/name: postgres
type: Opaque
stringData:
  # Official postgres image: POSTGRES_USER is superuser; POSTGRES_DB is created
  # and owned by that user. Mapped in deployment.yaml; first init only (empty data dir).
  postgres-user: "appuser"
  postgres-password: "changeme-app"
  postgres-database: "appdb"
